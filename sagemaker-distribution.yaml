package:
  name: sagemaker-distribution
  version: 3.0.0
  epoch: 0
  description: A set of Docker images that include popular frameworks for machine learning, data science and visualization.
  copyright:
    - license: Apache-2.0

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: maj_version
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: maj_min_version

environment:
  contents:
    packages:
      - busybox
      - py3.11-conda-bin

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aws/sagemaker-distribution
      tag: ${{package.version}}-cpu
      expected-commit: db4c61c113482edf37b938e03e6b94e6cad2d112
  
  - uses: patch
    with:
      patches: cpu.env.out.patch
  
  - runs: conda init
    working-directory: build_artifacts/v${{vars.maj_version}}/v${{vars.maj_min_version}}/v${{package.version}}

  - name: Create conda environment
    working-directory: build_artifacts/v${{vars.maj_version}}/v${{vars.maj_min_version}}/v${{package.version}}
    runs: |
      conda create --name sagemaker-distribution --file cpu.env.out

update:
  enabled: true
  github:
    identifier: aws/sagemaker-distribution
    strip-suffix: -cpu
    tag-filter: -cpu

test:
  environment:
