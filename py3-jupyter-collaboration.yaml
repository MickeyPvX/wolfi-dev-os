  #   description: python${{range.key}} version of ${{vars.pypi-package}}
  #   pipeline:
  #     - runs: apk add py${{range.key}}-jupyter-core-bin py${{range.key}}-jupyterlab-bin
  #     - uses: py/pip-build-install
  #       working-directory: projects/jupyter-collaboration-ui
  #       with:
  #         needs-exe-named-python3: true
  #         python: python${{range.key}}
  #     - runs: apk del py${{range.key}}-jupyter-core-bin py${{range.key}}-jupyterlab-bin
  #     - uses: strip
  #   test:
  #     pipeline:
  #       - uses: python/import
  #         with:
  #           python: python${{range.key}}
  #           import: ${{vars.import}}_ui

  - range: py-versions
    name: py${{range.key}}-jupyter-docprovider
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      runtime:
    pipeline:
      - runs: apk add py${{range.key}}-jupyter-core-bin py${{range.key}}-jupyterlab-bin
      - uses: py/pip-build-install
        working-directory: projects/jupyter-docprovider
        with:
          needs-exe-named-python3: true
          python: python${{range.key}}
      - runs: apk del py${{range.key}}-jupyter-core-bin py${{range.key}}-jupyterlab-bin
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            import: jupyter_docprovider

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}

update:
  enabled: true
  ignore-regex-patterns:
    - rc[0-9]+$
    - "[a-z]+[0-9]+$"
  github:
    identifier: jupyterlab/jupyter-collaboration
    strip-prefix: v
    tag-filter: v
