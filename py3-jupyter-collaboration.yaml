package:
  name: py3-jupyter-collaboration
  version: 4.0.1
  epoch: 0
  description: A meta-package for - jupyter-collaboration-ui, jupyter-docprovider, jupyter-server-ydoc
  annotations:
    cgr.dev/ecosystem: python
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0

vars:
  pypi-package: jupyter-collaboration
  import: jupyter_collaboration

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - build-base
      - make
      - posix-libc-utils
      - py3-supported-build-base
      - py3-supported-hatch-jupyter-builder
      - py3-supported-hatchling

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6dc3d2792cfcdc317f453f3b41ba04544f002483
      repository: https://github.com/jupyterlab/jupyter-collaboration
      tag: v${{package.version}}

subpackages:
