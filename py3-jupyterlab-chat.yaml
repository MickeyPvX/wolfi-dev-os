package:
  name: py3-jupyterlab-chat
  version: 0.10.0
  epoch: 0
  description: An extension to add a chat panel to JupyterLab
  annotations:
    cgr.dev/ecosystem: python
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0

vars:
  pypi-package: jupyterlab-chat
  import: jupyterlab_chat

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - bash
      - build-base
      - make
      - py3-supported-build-base
      - py3-supported-hatch-jupyter-builder
      - py3-supported-hatchling

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 38dc421fe9949ce8886d74dcfac33e8e49776d45
      repository: https://github.com/jupyterlab/jupyter-chat
      tag: v${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      - py${{range.key}}-jupyter-collaboration  # Need to build
      - py${{range.key}}-jupyter-server
      - py${{range.key}}-jupyter-ydoc           # Need to build
      - py${{range.key}}-jupyterlab
      - py${{range.key}}-pycrdt                 # Need to build
    pipeline:
      - runs: apk add py${{range.key}}-jupyterlab-bin py${{range.key}}-jupyter-core-bin
      - uses: py/pip-build-install
        working-directory: python/jupyterlab-chat
        with:
          needs-exe-named-python3: true
          python: python${{range.key}}
      - runs: apk del py${{range.key}}-jupyterlab-bin py${{range.key}}-jupyter-core-bin
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}

update:
  enabled: true
  ignore-regex-patterns:
    - .*rc[0-9]*$
    - .*[a-z][0-9]*$
  github:
    identifier: jupyterlab/jupyterlab
    strip-prefix: v
    tag-filter: v
